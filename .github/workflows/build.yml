name: Build GIM RENDER

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        uses: AnimMouse/setup-ffmpeg@v1

      - name: Install Python deps
        run: pip install --upgrade pip pyinstaller -r requirements.txt

      - name: Install PyObjC (macOS only)
        if: runner.os == 'macOS'
        run: pip install pyobjc-framework-Cocoa

      - name: Build executable
        run: pyinstaller GIM_RENDER.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location dist
          Get-ChildItem
          Compress-Archive -Path GIM_RENDER.exe -DestinationPath ../GIM_RENDER-Windows.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          cp -r ../efek ../assets .
          tar -czf ../GIM_RENDER-Linux.tar.gz GIM_RENDER efek assets

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          if [ -d "GIM_RENDER.app" ]; then
            mkdir -p GIM_RENDER.app/Contents/Resources
            cp -r ../efek GIM_RENDER.app/Contents/Resources/
            cp -r ../assets GIM_RENDER.app/Contents/Resources/
            codesign --force --deep --sign - GIM_RENDER.app 2>/dev/null || true
            zip -r ../GIM_RENDER-macOS.zip GIM_RENDER.app
          else
            cp -r ../efek ../assets .
            zip -r ../GIM_RENDER-macOS.zip GIM_RENDER efek assets
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: GIM_RENDER-${{ runner.os }}
          path: GIM_RENDER-${{ runner.os }}.*
