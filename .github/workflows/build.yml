name: Build GIM RENDER

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: pyinstaller GIM_RENDER.spec --noconfirm

      - name: Create archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: cd dist && tar -czf ../GIM_RENDER-${{ runner.os }}.tar.gz GIM_RENDER

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: cd dist && 7z a ../GIM_RENDER-Windows.zip GIM_RENDER.exe efek assets

      - uses: actions/upload-artifact@v4
        with:
          name: GIM_RENDER-${{ runner.os }}
          path: GIM_RENDER-${{ runner.os }}.*
