name: Build GIM RENDER

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        uses: AnimMouse/setup-ffmpeg@v1

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          if [ "${{ runner.os }}" = "macOS" ]; then
            pip install pyobjc-framework-Cocoa
          fi
          pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller GIM_RENDER.spec --noconfirm

      - name: Create archive (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../GIM_RENDER-macOS.zip GIM_RENDER.app efek assets

      - name: Create archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf ../GIM_RENDER-Linux.tar.gz GIM_RENDER efek assets

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          7z a ../GIM_RENDER-Windows.zip GIM_RENDER.exe efek assets

      - uses: actions/upload-artifact@v4
        with:
          name: GIM_RENDER-${{ runner.os }}
          path: GIM_RENDER-${{ runner.os }}.*
